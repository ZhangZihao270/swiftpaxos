-- Replicas --
// 5-replica layout (1 per machine)
replica0 34.236.191.149
replica1 18.221.173.128
replica2 16.147.240.15
replica3 108.130.8.61
replica4 35.183.203.84

-- Clients --
// Only 3 clients on fast machines
client0 54.161.47.1
client1 3.16.31.48
client2 35.91.202.195

-- Master --
master0 18.221.173.128

masterPort: 7087

// Protocol — overridden by script
protocol: curpho

// TAO-like workload parameters
// Global target: 1% writes (all strong), 4% strong reads, 95% causal reads
// writes=20 → 20% of strong ops are writes → 5% × 20% = 1% global writes
// weakRatio=95 → 95% of ops are causal
// weakWrites=0 → all causal ops are reads (no causal writes)
writes:      20
weakRatio:   95
weakWrites:  0

// SCAN parameters (within causal reads)
// scanRatio=44 → 43.7% of causal reads are SCAN (assoc_range 40.9% + assoc_time_range 2.8%)
// scanCount=1000 → max keys per SCAN, actual count drawn from Zipf[1, 1000]
scanRatio:   44
scanCount:   1000

// Replica settings
maxDescRoutines: 500
batchDelayUs: 150
noop:       false
thrifty:    false
fast:       true

// Client settings
reqs:        5000
commandSize: 100
clientThreads: 32
pipeline:    true
pendings:    15

// Network delay simulation
networkDelay: 0

// Key distribution — Zipf(0.8) following NCC [OSDI'23] and LinkBench
keySpace:    1000000
zipfSkew:    0.8

-- Proxy --
// Each client co-located with its respective replica
server_alias replica0
client0 54.161.47.1
server_alias replica1
client1 3.16.31.48
server_alias replica2
client2 35.91.202.195
---
