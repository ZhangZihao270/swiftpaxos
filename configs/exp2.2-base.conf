-- Replicas --
// 5-replica layout (1 per machine): .101, .103, .104, .125, .126
// Ports auto-derived from alias index: replica{i} -> port 7070+i
replica0 130.245.173.101
replica1 130.245.173.103
replica2 130.245.173.104
replica3 130.245.173.125
replica4 130.245.173.126

-- Clients --
// Only 3 clients on fast machines (no clients on .125/.126)
client0 130.245.173.101
client1 130.245.173.103
client2 130.245.173.104

-- Master --
master0 130.245.173.103

masterPort: 7087

// Protocol and hybrid settings — overridden by script
protocol: epaxos
weakRatio:   0
writes:      50
weakWrites:  50

maxDescRoutines: 500
batchDelayUs: 150

// Replica settings
noop:       false
thrifty:    false
fast:       true

// Client settings
reqs:        3000
commandSize: 100
clientThreads: 32
pipeline:    true
pendings:    15

// Network delay simulation (application-level, no root needed)
networkDelay: 25

// Key distribution — zipfSkew overridden by script
keySpace:    1000000
zipfSkew:    0

-- Proxy --
// Each client co-located with its respective replica
server_alias replica0
client0 (local)
server_alias replica1
client1 (local)
server_alias replica2
client2 (local)
---
