-- Replicas --
// 5-replica layout (1 per machine): .101, .103, .104, .125, .126
// Ports auto-derived from alias index: replica{i} -> port 7070+i
replica0 13.58.3.12
replica1 100.26.140.158
replica2 52.35.107.158
replica3 3.250.222.202
replica4 15.222.250.161

-- Clients --
// Only 3 clients on fast machines (no clients on .125/.126)
client0 18.118.148.48
client1 13.217.18.39
client2 18.236.78.252

-- Master --
master0 100.26.140.158

masterPort: 7087

// Protocol and hybrid settings — overridden by script
protocol: epaxos
weakRatio:   0
writes:      50
weakWrites:  50

maxDescRoutines: 500
batchDelayUs: 150

// Replica settings
noop:       false
thrifty:    false
fast:       true

// Client settings
reqs:        3000
commandSize: 100
clientThreads: 32
pipeline:    true
pendings:    15

// Network delay simulation (application-level, no root needed)
networkDelay: 0

// Key distribution — zipfSkew overridden by script
keySpace:    1000000
zipfSkew:    0

-- Proxy --
// Each client co-located with its respective replica
server_alias replica0
client0 18.118.148.48
server_alias replica1
client1 13.217.18.39
server_alias replica2
client2 18.236.78.252
