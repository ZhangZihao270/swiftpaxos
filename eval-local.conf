-- Replicas --
replica0 127.0.0.1
replica1 127.0.0.2
replica2 127.0.0.3

-- Clients --
client0 127.0.0.4
client1 127.0.0.5
client2 127.0.0.6

-- Master --
master0 127.0.0.1

masterPort: 7087

protocol: curpht
maxDescRoutines: 500
batchDelayUs: 150

// Replica settings
noop:       false
thrifty:    false
fast:       true

// Client settings
reqs:        5000
writes:      5
conflicts:   0
commandSize: 100
clientThreads: 2
pipeline:    true
pendings:    15

// Hybrid benchmark settings
weakRatio:   50
weakWrites:  5

// Network delay simulation (one-way 50ms = RTT 100ms)
networkDelay: 50

// Key distribution
keySpace:    1000000
zipfSkew:    0.99

-- Proxy --
server_alias replica0
client0 (local)
server_alias replica1
client1 (local)
server_alias replica2
client2 (local)
---
