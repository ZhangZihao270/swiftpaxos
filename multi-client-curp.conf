// Replica settings
noop:       false
thrifty:    false
fast:       true

// Client settings
reqs:        10000
writes:      10       // 10% of strong commands are writes
conflicts:   0
commandSize: 100
clientThreads: 2      // Threads per client server (1 = single thread)
pipeline:    true     // Enable pipelining (send multiple commands without waiting)
pendings:    15       // Max in-flight commands per thread (optimal for CURP under latency)

// Hybrid benchmark settings (Phase 52.4: CURP only supports strong consistency)
weakRatio:   0        // CURP does not support weak consistency - all commands are strong
weakWrites:  0        // Not applicable (weakRatio=0)

// Network delay simulation (application-level, no root needed)
networkDelay: 25        // One-way delay in ms (0=disabled). Injected at message receive.

// Key distribution
keySpace:    1000000  // Total unique keys (1M)
zipfSkew:    0.99      // 0=uniform, >1=Zipf

