\* TLC model checking configuration for EPaxos-HO Orca (5 replicas)

CONSTANTS
    MaxBallot <- MCMaxBallot
    Replicas <- MCReplicas
    Consistency_level <- MCConsistencyLevel
    Ctx_id <- MCCtxId
    Keys <- MCKeys
    Commands <- MCCommands

SPECIFICATION Spec

CHECK_DEADLOCK FALSE

INVARIANT TypeOK
INVARIANT Nontriviality
INVARIANT Consistency
INVARIANT Stability
INVARIANT SameSessionCausality
INVARIANT GetFromCausality
INVARIANT GlobalOrderingOfWrite
INVARIANT GlobalOrderingOfRead
INVARIANT RealTimeOrderingOfStrong
INVARIANT OrcaLinearizabilityInv
INVARIANT OrcaCausalConsistencyInv
INVARIANT OrcaHybridCompatibilityInv
INVARIANT OrcaConvergence
