\* TLC model checking configuration for Raft-HT

\* ============================================================================
\* Model Values
\* ============================================================================

CONSTANTS
    r1 = r1
    r2 = r2
    r3 = r3
    c1 = c1
    c2 = c2
    k1 = k1
    k2 = k2
    v1 = v1
    v2 = v2
    nil = nil

\* ============================================================================
\* Constant Overrides (definition overrides using <-)
\* ============================================================================

CONSTANTS
    Replicas   <- MCReplicas
    Clients    <- MCClients
    Keys       <- MCKeys
    Values     <- MCValues
    MaxOps     <- MCMaxOps
    Nil        <- MCNil
    InitLeader <- MCInitLeader

\* ============================================================================
\* Specification
\* ============================================================================

SPECIFICATION Spec

\* ============================================================================
\* Symmetry
\* ============================================================================

SYMMETRY MCSymmetry

\* ============================================================================
\* State Constraint
\* ============================================================================

CONSTRAINT MCStateConstraint

\* ============================================================================
\* Deadlock
\* ============================================================================

\* Terminal states (all ops completed, all messages consumed) are expected.
CHECK_DEADLOCK FALSE

\* ============================================================================
\* Invariants
\* ============================================================================

INVARIANT MCTypeInv
INVARIANT SafetyInv
